version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: scrapbridge
      POSTGRES_PASSWORD: scrapbridge
      POSTGRES_DB: scrapbridge
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
